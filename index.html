<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Quiz Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🧠 AI Quiz Generator</h1>

    <!-- Topic -->
    <input type="text" id="topic" placeholder="Enter topic (e.g. Physics)">

    <!-- MCQ Buttons -->
    <p class="label">Number of Questions</p>
    <div class="mcq-buttons">
      <button onclick="setQuestions(5)">5</button>
      <button onclick="setQuestions(10)">10</button>
      <button onclick="setQuestions(15)">15</button>
      <button onclick="setQuestions(20)">20</button>
    </div>

    <input type="number" id="num" placeholder="Or enter custom number" min="1" max="50">

    <!-- Difficulty Buttons -->
    <p class="label">Difficulty</p>
    <div class="difficulty-buttons">
      <button onclick="setDifficulty('easy')">Easy</button>
      <button onclick="setDifficulty('medium')">Medium</button>
      <button onclick="setDifficulty('hard')">Hard</button>
    </div>

    <!-- Generate Button -->
    <button class="generate-btn" onclick="startQuiz()">Generate Quiz</button>
  </div>


<script src="config.js"></script>
<script src="index.js"></script>
</body>
</html>
